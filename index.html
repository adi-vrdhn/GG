<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cutest Person in the World Competition</title>

<style>

body{
font-family: Arial;
background:#f6e7e3;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:600px;
}

.images{
display:flex;
gap:40px;
justify-content:center;
margin-top:20px;
}

img{
width:180px;
height:180px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-7px)}
50%{transform:translateX(7px)}
75%{transform:translateX(-7px)}
100%{transform:translateX(0)}
}

button{
padding:10px 20px;
font-size:16px;
border:none;
background:#ff5c7a;
color:white;
border-radius:8px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div id="nameScreen">

<h2>Enter your name</h2>

<input id="nameInput">

<br><br>

<button onclick="start()">Start</button>

</div>


<div id="game" class="hidden">

<h2>Cutest Person in the World Competition</h2>

<p>Select the cutest person</p>

<div class="images">

<img id="gayatri">

<img id="opponent">

</div>

<p id="round"></p>

</div>


<div id="win" class="hidden">

<h1>You finished all rounds 😌</h1>

<img src="images/GAYATRI.jpeg" style="margin-top:20px; width:220px; height:220px; object-fit:cover; border-radius:12px;">

<p style="margin-top:20px;">
Turns out the cutest person in the world is Gayatri.
</p>

</div>

</div>


<script>

let opponents = [

"images/ronaldo.jpeg",
"images/rana.jpeg",
"images/ryan.jpeg",
"images/srk.jpeg",
"images/Stitch.jpeg",
"images/sydeny.jpeg"

]

let round = 0


function start(){

let name = document.getElementById("nameInput").value.toLowerCase()

if(name !== "gayatri"){
alert("Only Gayatri can enter this competition.")
return
}

document.getElementById("nameScreen").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

loadRound()

}


function loadRound(){

document.getElementById("gayatri").src =
"images/GAYATRI.jpeg"

document.getElementById("opponent").src =
opponents[round]

document.getElementById("round").innerText =
"Round " + (round+1) + " of " + opponents.length

}


document.getElementById("gayatri").onclick = function(){

round++

if(round >= opponents.length){

document.getElementById("game").classList.add("hidden")
document.getElementById("win").classList.remove("hidden")

return
}

loadRound()

}


document.getElementById("opponent").onclick = function(){

let img = document.getElementById("opponent")

img.classList.add("shake")

setTimeout(()=>{
img.classList.remove("shake")
},400)

}

</script>

</body>
</html>
